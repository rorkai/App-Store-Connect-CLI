version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Baseline "industry standard" Go checks.
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - unparam
    - errorlint

  settings:
    misspell:
      # Words used intentionally in Apple/ASC API context.
      ignore-rules:
        - cancelled
        - cancelling

issues:
  exclude-rules:
    # Ignore stylecheck naming warnings (e.g. `app_events` package) to avoid
    # massive rename churn; keep other style rules like ST1005.
    - linters: [staticcheck]
      text: "ST1003:"
